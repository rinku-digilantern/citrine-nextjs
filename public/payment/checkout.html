<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment – Citrine Clinic</title>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent linear-gradient(251deg, #d29740, #ebd577, #d0913b 82%, #e7ca6d) 0% 0% no-repeat padding-box;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border-top: 4px solid #d29740;
        }

        .header {
            background: #fbfbfb;
            color: #333;
            padding: 30px;
            border-radius: 12px 12px 0 0;
            text-align: center;
            position: relative;
        }

        .header-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 0px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
        }

        .subtitle {
            opacity: 0.9;
            margin-top: 5px;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #d29740;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d29740;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-section-title {
            color: #d29740;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid #f0e5cc;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background-color: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #d29740;
            box-shadow: 0 0 0 3px rgba(210, 151, 64, 0.1);
        }

        .form-group input[readonly],
        .form-group input:disabled {
            background: #f5f5f5;
            color: #555;
            cursor: default;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            background: transparent linear-gradient(251deg, #d29740, #ebd577, #d0913b 82%, #e7ca6d) 0% 0% no-repeat padding-box;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(210, 151, 64, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(210, 151, 64, 0.5);
            opacity: 0.95;
        }

        .btn:active { transform: translateY(0); }

        .btn:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Alert Messages */
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show { display: block; }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        /* Amount box */
        .amount-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 2px solid #e9ecef;
        }

        .amount-box label { color: #6c757d; }

        .amount-box input {
            font-size: 18px;
            font-weight: 600;
            color: #d29740;
            background: transparent;
            border: none;
            padding: 4px 0;
        }

        .amount-box input:focus {
            outline: none;
            border: none;
            box-shadow: none;
        }

        /* Coupon */
        .coupon-box {
            background: #FFF9E6;
            padding: 15px;
            border-radius: 6px;
            border: 2px solid #ebd577;
            margin-top: 10px;
        }

        .coupon-box label { color: #d29740; font-weight: 600; }

        .coupon-row {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .coupon-row input {
            flex: 1;
            text-transform: uppercase;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-apply {
            padding: 12px 25px;
            background: linear-gradient(135deg, #52c41a, #73d13d);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        .btn-apply:disabled { background: #adb5bd; cursor: not-allowed; }

        #couponMessageView {
            margin-top: 10px;
            font-size: 14px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            font-weight: 600;
        }

        #discountInfoView {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 6px;
            display: none;
        }

        .discount-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .discount-total {
            display: flex;
            justify-content: space-between;
            padding-top: 8px;
            border-top: 2px solid #ebd577;
            font-weight: 600;
        }

        @media only screen and (max-width:600px) {
            .content { padding: 15px; }
            .header { padding: 15px; }
        }
    </style>

    <script src="/api-config.js"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <img src="https://www.citrineclinic.com/assets/images/logo.png" alt="Citrine Clinic" class="header-logo">
            <p class="subtitle">Book Your Appointment</p>
        </div>

        <div class="content">
            <!-- Loading State -->
            <div id="loadingState" class="loading" style="display:none;">
                <div class="loader"></div>
                <p id="loadingText">Submitting your query...</p>
            </div>

            <!-- Alert Messages -->
            <div id="alertMessage" class="alert"></div>

            <!-- ========== QUERY FORM ========== -->
            <div id="queryForm">
                <h3 style="color: #333; margin-bottom: 6px; font-size: 20px;">Book Appointment</h3>
                <p style="color:#888; font-size:13px; margin-bottom:20px;">Fill in your details and we'll confirm your slot.</p>

                <!-- Hidden Fields -->
                <input type="hidden" id="pmsUniqueId">
                <input type="hidden" id="localTransactionId">
                <input type="hidden" id="clinicLocationId" value="133">

                <div class="form-section-title">Personal Details</div>

                <div class="grid">
                    <div class="form-group">
                        <label>Full Name <span style="color:#dc3545;">*</span></label>
                        <input type="text" id="qName" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone <span style="color:#dc3545;">*</span></label>
                        <input type="tel" id="qPhone" maxlength="10" placeholder="10-digit mobile number" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email <span style="color:#dc3545;">*</span></label>
                    <input type="email" id="qEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-section-title">Appointment Details</div>

                <div class="form-group">
                    <label>Service / Concern <span style="color:#dc3545;">*</span></label>
                    <input type="text" id="qService" placeholder="e.g. Hair Fall, Skin Treatment, Laser" required>
                </div>

                <div class="form-group">
                    <label>Message / Notes</label>
                    <textarea id="qMessage" rows="2" placeholder="Any specific details or requirements..."></textarea>
                </div>

                <div class="form-section-title">Schedule</div>

                <div class="grid">
                    <div class="form-group">
                        <label>Preferred Date <span style="color:#dc3545;">*</span></label>
                        <input type="date" id="qDate" required onchange="fetchSlots()">
                    </div>
                    <div class="form-group">
                        <label>Select Doctor <span style="color:#dc3545;">*</span></label>
                        <select id="qDoctor" required onchange="onDoctorChange()">
                            <option value="">Select Doctor</option>
                        </select>
                    </div>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label>Select Time Slot <span style="color:#dc3545;">*</span></label>
                        <select id="qSlot" required>
                            <option value="">Select Time Slot</option>
                        </select>
                    </div>
                    <div class="form-group amount-box">
                        <label>Amount (INR)</label>
                        <input type="number" id="qPrice" disabled placeholder="—">
                        <p id="doctorHoursInfo" style="font-size:12px; color:#888; margin-top:6px; display:none;"></p>
                    </div>
                </div>

                <!-- Coupon Section -->
                <div class="coupon-box" id="couponSection" style="display:none;">
                    <label>🎟️ Have a Coupon Code?</label>
                    <div class="coupon-row">
                        <input type="text" id="couponCodeInput" placeholder="Enter coupon code" maxlength="50">
                        <button type="button" class="btn-apply" id="applyCouponBtn" onclick="applyCoupon()">Apply</button>
                    </div>
                    <div id="couponMessageView"></div>
                    <div id="discountInfoView">
                        <div class="discount-row">
                            <span>Original Amount:</span>
                            <span id="originalAmountView" style="font-weight:600;">₹0</span>
                        </div>
                        <div class="discount-row" style="color:#52c41a;">
                            <span>Discount:</span>
                            <span id="discountAmountView" style="font-weight:600;">-₹0</span>
                        </div>
                        <div class="discount-total">
                            <span>Final Amount:</span>
                            <span id="finalAmountView" style="color:#d29740; font-size:18px;">₹0</span>
                        </div>
                        <button type="button" onclick="removeCoupon()"
                            style="margin-top:10px; padding:5px 10px; background:#ff4d4f; color:white; border:none; border-radius:4px; cursor:pointer; font-size:12px;">
                            Remove Coupon
                        </button>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn" id="submitQueryBtn" onclick="submitQuery()">
                        📋 Submit &amp; Proceed to Payment
                    </button>
                </div>
            </div>
            <!-- ========== END QUERY FORM ========== -->

            <input type="hidden" id="apiBaseUrl" value="https://api.citrineclinic.com/api">
        </div>
    </div>

    <script>
        // ─── State ────────────────────────────────────────────────────────────
        let doctorsList = [];
        let appliedCoupon = null;
        let originalPriceValue = 0;
        let submittedQueryData = null; // stored after PMS submission

        // Doctor price / hours local maps (fallback)
        const DOCTOR_PRICE_MAP = {
            'dr niti': 2000,
            'dr niti gaur': 2000,
            'default': 1200
        };

        const DOCTOR_HOURS_MAP = {
            'dr niti gaur': '10 AM – 5 PM',
            'dr guneet bedi': '10 AM – 6 PM',
            'dr raheel khan': '11 AM – 8 PM'
        };

        // ─── Helpers ─────────────────────────────────────────────────────────
        function getApiUrl() {
            return document.getElementById('apiBaseUrl').value;
        }

        function getUrlParameter(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        function showAlert(type, message) {
            const el = document.getElementById('alertMessage');
            el.className = `alert alert-${type} show`;
            el.textContent = message;
            el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            if (type !== 'success') {
                setTimeout(() => el.classList.remove('show'), 6000);
            }
        }

        function showLoading(text = 'Please wait...') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('queryForm').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('queryForm').style.display = 'block';
        }

        // ─── Doctor helpers ───────────────────────────────────────────────────
        function getDoctorPrice(doctor) {
            if (!doctor) return null;
            const nameLower = (doctor.name || '').toLowerCase();
            if (nameLower.includes('niti')) return 2000;
            if (doctor.price !== undefined && doctor.price !== null && doctor.price !== '') {
                return parseFloat(doctor.price);
            }
            return DOCTOR_PRICE_MAP['default'];
        }

        function getDoctorHours(doctor) {
            if (!doctor) return null;
            if (doctor.working_hours) return doctor.working_hours;
            const nameLower = (doctor.name || '').toLowerCase();
            return DOCTOR_HOURS_MAP[nameLower] || null;
        }

        function isSlotWithinAllowedHours(doctorName, slotStartTime) {
            if (!doctorName || !slotStartTime) return true;
            const n = doctorName.toLowerCase();
            let s = null, e = null;
            if (n.includes('niti'))   { s = '10:00'; e = '17:00'; }
            else if (n.includes('guneet')) { s = '10:00'; e = '18:00'; }
            else if (n.includes('raheel')) { s = '11:00'; e = '20:00'; }
            if (s && e) return slotStartTime >= s && slotStartTime < e;
            return true;
        }

        function onDoctorChange() {
            const doctorId = document.getElementById('qDoctor').value;
            const doctor = doctorsList.find(d => String(d.id) === String(doctorId));
            if (doctor) {
                const price = getDoctorPrice(doctor);
                if (price !== null) {
                    document.getElementById('qPrice').value = price;
                    // Show coupon section once price is known
                    document.getElementById('couponSection').style.display = 'block';
                }
                const hours = getDoctorHours(doctor);
                const hoursEl = document.getElementById('doctorHoursInfo');
                if (hours) {
                    hoursEl.textContent = '🕐 Consultation Hours: ' + hours;
                    hoursEl.style.display = 'block';
                } else {
                    hoursEl.style.display = 'none';
                }
            } else {
                document.getElementById('qPrice').value = '';
                document.getElementById('doctorHoursInfo').style.display = 'none';
                document.getElementById('couponSection').style.display = 'none';
            }
            fetchSlots();
        }

        // ─── Load doctors ─────────────────────────────────────────────────────
        async function loadDoctors() {
            try {
                const response = await fetch(`${getApiUrl()}/get-doctor-list`);
                const result = await response.json();
                if ((result.status === 'success' || result.success === true) && result.data) {
                    doctorsList = result.data.filter(doc => !doc.name.toLowerCase().includes('moonis'));
                    const sel = document.getElementById('qDoctor');
                    sel.innerHTML = '<option value="">Select Doctor</option>';
                    doctorsList.forEach(doc => {
                        const opt = document.createElement('option');
                        opt.value = doc.id;
                        opt.textContent = doc.name;
                        sel.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('Error loading doctors:', e);
            }
        }

        // ─── Fetch slots ──────────────────────────────────────────────────────
        async function fetchSlots() {
            const doctorId = document.getElementById('qDoctor').value;
            const date = document.getElementById('qDate').value;
            const slotSelect = document.getElementById('qSlot');
            const todayStr = new Date().toISOString().split('T')[0];

            if (date === todayStr) {
                showAlert('error', 'Today\'s appointment slots are not available. Please select a future date.');
                slotSelect.innerHTML = '<option value="">Select Time Slot</option>';
                return;
            }
            if (!doctorId || !date) {
                slotSelect.innerHTML = '<option value="">Select Time Slot</option>';
                return;
            }

            slotSelect.innerHTML = '<option value="">Loading slots...</option>';

            try {
                const response = await fetch(`${getApiUrl()}/get-doctor-slots`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doctor_id: doctorId, date })
                });
                const result = await response.json();

                if (result.success && result.slots) {
                    slotSelect.innerHTML = '<option value="">Select Time Slot *</option>';
                    let hasSlots = false;
                    const periods = [
                        { key: 'morning', label: 'Morning' },
                        { key: 'afternoon', label: 'Afternoon' },
                        { key: 'evening', label: 'Evening' }
                    ];
                    const doctor = doctorsList.find(d => String(d.id) === String(doctorId));
                    const doctorName = doctor ? doctor.name : '';

                    periods.forEach(period => {
                        const periodSlots = result.slots[period.key];
                        if (Array.isArray(periodSlots) && periodSlots.length > 0) {
                            const optgroup = document.createElement('optgroup');
                            optgroup.label = period.label;
                            let periodHas = false;
                            periodSlots.forEach(slot => {
                                if (isSlotWithinAllowedHours(doctorName, slot.start_time)) {
                                    hasSlots = true;
                                    periodHas = true;
                                    const opt = document.createElement('option');
                                    opt.value = slot.display;
                                    opt.textContent = slot.display;
                                    optgroup.appendChild(opt);
                                }
                            });
                            if (periodHas) slotSelect.appendChild(optgroup);
                        }
                    });

                    if (!hasSlots) {
                        slotSelect.innerHTML = '<option value="">No slots available for this date</option>';
                    }
                } else {
                    slotSelect.innerHTML = '<option value="">No slots available</option>';
                }
            } catch (e) {
                console.error('Error fetching slots:', e);
                slotSelect.innerHTML = '<option value="">Error loading slots</option>';
            }
        }

        // ─── Coupon logic ─────────────────────────────────────────────────────
        async function applyCoupon() {
            const couponCode = document.getElementById('couponCodeInput').value.trim().toUpperCase();
            const amount = document.getElementById('qPrice').value;
            const phone = document.getElementById('qPhone').value;
            const email = document.getElementById('qEmail').value;
            const btn = document.getElementById('applyCouponBtn');

            if (!couponCode) { showCouponMsg('⚠️ Please enter a coupon code.', 'error'); return; }
            if (!amount || amount <= 0) { showCouponMsg('⚠️ Invalid amount.', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Validating...';

            try {
                const res = await fetch(`${getApiUrl()}/validate-coupon`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coupon_code: couponCode, amount, phone, email })
                });
                const data = await res.json();

                if (data.success) {
                    appliedCoupon = { ...data.data, coupon_code: couponCode };
                    originalPriceValue = amount;
                    document.getElementById('originalAmountView').textContent = '₹' + data.data.original_amount;
                    document.getElementById('discountAmountView').textContent = '-₹' + data.data.discount_amount;
                    document.getElementById('finalAmountView').textContent = '₹' + data.data.final_amount;
                    document.getElementById('discountInfoView').style.display = 'block';
                    document.getElementById('qPrice').value = data.data.final_amount;
                    document.getElementById('couponCodeInput').disabled = true;
                    btn.textContent = 'Applied ✓';
                    showCouponMsg(`✅ ${data.message} You saved ₹${data.data.savings}!`, 'success');
                } else {
                    showCouponMsg('❌ ' + (data.message || 'Invalid coupon code.'), 'error');
                    btn.disabled = false;
                    btn.textContent = 'Apply';
                }
            } catch (e) {
                showCouponMsg('❌ Failed to validate coupon. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Apply';
            }
        }

        function removeCoupon() {
            appliedCoupon = null;
            if (originalPriceValue > 0) document.getElementById('qPrice').value = originalPriceValue;
            document.getElementById('couponCodeInput').value = '';
            document.getElementById('couponCodeInput').disabled = false;
            document.getElementById('discountInfoView').style.display = 'none';
            document.getElementById('applyCouponBtn').disabled = false;
            document.getElementById('applyCouponBtn').textContent = 'Apply';
            setTimeout(() => document.getElementById('couponMessageView').style.display = 'none', 500);
        }

        function showCouponMsg(message, type) {
            const el = document.getElementById('couponMessageView');
            el.style.display = 'block';
            el.textContent = message;
            el.style.fontWeight = '600';
            if (type === 'success') {
                el.style.color = '#155724';
                el.style.backgroundColor = '#d4edda';
                el.style.borderLeft = '4px solid #28a745';
            } else {
                el.style.color = '#721c24';
                el.style.backgroundColor = '#f8d7da';
                el.style.borderLeft = '4px solid #dc3545';
                setTimeout(() => el.style.display = 'none', 5000);
            }
        }

        // ─── MAIN: Submit query → PMS + local DB → then payment ──────────────
        async function submitQuery() {
            const name    = document.getElementById('qName').value.trim();
            const phone   = document.getElementById('qPhone').value.trim();
            const email   = document.getElementById('qEmail').value.trim();
            const service = document.getElementById('qService').value.trim();
            const message = document.getElementById('qMessage').value.trim();
            const date    = document.getElementById('qDate').value;
            const doctor  = document.getElementById('qDoctor').value;
            const slot    = document.getElementById('qSlot').value;
            const price   = document.getElementById('qPrice').value;
            const clinicId = document.getElementById('clinicLocationId').value;

            // ── Validation ──
            if (!name)    { showAlert('error', 'Please enter your full name.'); return; }
            if (!email)   { showAlert('error', 'Please enter your email address.'); return; }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('error', 'Please enter a valid email address.'); return;
            }
            if (!phone || phone.length !== 10 || !/^\d{10}$/.test(phone)) {
                showAlert('error', 'Please enter a valid 10-digit phone number.'); return;
            }
            if (!service) { showAlert('error', 'Please enter the service or concern.'); return; }
            if (!date)    { showAlert('error', 'Please select an appointment date.'); return; }
            if (!doctor)  { showAlert('error', 'Please select a doctor.'); return; }
            if (!slot)    { showAlert('error', 'Please select a time slot.'); return; }
            if (!price || parseFloat(price) <= 0) {
                showAlert('error', 'Amount is not set. Please select a doctor to get the consultation fee.'); return;
            }

            const btn = document.getElementById('submitQueryBtn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            showLoading('Creating your appointment query...');

            try {
                // ── Step 1: Submit query to our backend (which calls PMS + stores locally) ──
                const queryPayload = {
                    name,
                    phone,
                    email,
                    service,
                    message,
                    date,
                    doctor_id: doctor,
                    time_slot: slot,
                    amount: price,
                    clinic_location_id: clinicId,
                    unique_type: getUrlParameter('unique_type') || 'enquiry',
                    coupon_code: appliedCoupon ? appliedCoupon.coupon_code : null
                };

                const queryRes = await fetch(`${getApiUrl()}/wa-query-submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(queryPayload)
                });

                const queryData = await queryRes.json();

                if (!queryData.success) {
                    hideLoading();
                    showAlert('error', queryData.message || 'Failed to create query. Please try again.');
                    btn.disabled = false;
                    btn.textContent = '📋 Submit & Proceed to Payment';
                    return;
                }

                // Store returned IDs for payment step
                document.getElementById('pmsUniqueId').value = queryData.data.pms_unique_id || '';
                document.getElementById('localTransactionId').value = queryData.data.transaction_id || '';

                submittedQueryData = {
                    ...queryPayload,
                    transaction_id: queryData.data.transaction_id,
                    pms_unique_id: queryData.data.pms_unique_id,
                };

                // ── Step 2: Initialize payment ──
                showLoading('Initializing payment...');

                const paymentPayload = {
                    transaction_id: queryData.data.transaction_id,
                    name,
                    email,
                    phone,
                    appointment_date: date,
                    service,
                    doctor_id: doctor,
                    time_slot: slot,
                    message,
                    amount: price,
                    clinic_location_id: clinicId,
                    unique_type: getUrlParameter('unique_type') || 'enquiry',
                    coupon_code: appliedCoupon ? appliedCoupon.coupon_code : null
                };

                const payRes = await fetch(`${getApiUrl()}/payment-initialize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paymentPayload)
                });

                const payData = await payRes.json();

                if (payData.success && payData.data.payment_session_id) {
                    const orderId = payData.data.order_id;
                    sessionStorage.setItem('pending_order_id', orderId);
                    sessionStorage.setItem('lastPaymentData', JSON.stringify({
                        transaction_id: queryData.data.transaction_id,
                        unique_type: getUrlParameter('unique_type') || 'enquiry'
                    }));
                    hideLoading();
                    openCashfreeCheckout(payData.data.payment_session_id, payData.data.environment, orderId);
                } else {
                    hideLoading();
                    showAlert('error', payData.message || 'Failed to initialize payment. Please try again.');
                    btn.disabled = false;
                    btn.textContent = '📋 Submit & Proceed to Payment';
                }

            } catch (err) {
                console.error('submitQuery error:', err);
                hideLoading();
                showAlert('error', 'Connection error. Please check your internet and try again.');
                btn.disabled = false;
                btn.textContent = '📋 Submit & Proceed to Payment';
            }
        }

        // ─── Cashfree checkout ────────────────────────────────────────────────
        function openCashfreeCheckout(sessionId, environment, orderId) {
            const cashfree = Cashfree({
                mode: environment === 'production' ? 'production' : 'sandbox'
            });

            const checkoutOptions = {
                paymentSessionId: sessionId,
                returnUrl: `https://www.citrineclinic.com/payment/payment-callback.html?order_id=${orderId}`,
                redirectTarget: '_self'
            };

            cashfree.checkout(checkoutOptions).then((result) => {
                if (result.error) {
                    console.error('Payment error:', result.error);
                    showAlert('error', 'Payment failed: ' + result.error.message);
                    const btn = document.getElementById('submitQueryBtn');
                    btn.disabled = false;
                    btn.textContent = '📋 Submit & Proceed to Payment';
                }
                if (result.paymentDetails) {
                    window.location.href = `https://www.citrineclinic.com/payment/payment-callback.html?order_id=${orderId}`;
                }
            }).catch((error) => {
                console.error('Checkout error:', error);
                showAlert('error', 'Payment checkout failed. Please try again.');
                const btn = document.getElementById('submitQueryBtn');
                btn.disabled = false;
                btn.textContent = '📋 Submit & Proceed to Payment';
            });
        }

        // ─── Init ─────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            // Autofill phone from URL: ?phone=9876543210
            const urlPhone = getUrlParameter('phone') || getUrlParameter('mobile');
            if (urlPhone) {
                const cleaned = urlPhone.replace(/^\+91/, '').replace(/\D/g, '').slice(-10);
                document.getElementById('qPhone').value = cleaned;
            }

            // Autofill name if passed
            const urlName = getUrlParameter('name');
            if (urlName) document.getElementById('qName').value = decodeURIComponent(urlName);

            // Autofill service if passed
            const urlService = getUrlParameter('service');
            if (urlService) document.getElementById('qService').value = decodeURIComponent(urlService);

            // Set min date = tomorrow
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const minDate = tomorrow.toISOString().split('T')[0];
            document.getElementById('qDate').setAttribute('min', minDate);

            // Load doctors list
            loadDoctors();
        });
    </script>
</body>

</html>
